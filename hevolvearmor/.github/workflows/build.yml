name: Build & Test HevolveArmor

on:
  push:
    paths:
      - 'hevolvearmor/**'
  pull_request:
    paths:
      - 'hevolvearmor/**'
  workflow_dispatch:

concurrency:
  group: hevolvearmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: '3.11'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: '3.12'
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            python: '3.11'
          # macOS x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            python: '3.11'
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            python: '3.11'
          - os: macos-14
            target: aarch64-apple-darwin
            python: '3.12'
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.11'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.12'

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        working-directory: hevolvearmor
        run: maturin build --release --target ${{ matrix.target }}

      - name: Install wheel
        working-directory: hevolvearmor
        shell: bash
        run: pip install target/wheels/hevolvearmor*.whl

      - name: Run unit tests
        working-directory: hevolvearmor
        run: |
          pip install pytest cryptography
          python -m pytest tests/test_full_suite.py -v -k "TestCrypto or TestKeyDerivation or TestSelfHash or TestAntiDebug or TestMachineInfo or TestLicense" --tb=short

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}-py${{ matrix.python }}
          path: hevolvearmor/target/wheels/*.whl

  # Collect all wheels into a single artifact
  collect-wheels:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Upload combined wheels
        uses: actions/upload-artifact@v4
        with:
          name: hevolvearmor-wheels-all
          path: wheels/*.whl
